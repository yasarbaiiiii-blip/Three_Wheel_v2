/**:
  ros__parameters:
    plugin_denylist:
      - image_pub        # No camera
      - vibration        # No vibration monitoring
      - distance_sensor  # No proximity sensors
      - rangefinder      # No rangefinder hardware
      - wheel_odometry   # Conflicts with PX4 EKF2 odometry
      - odometry         # Conflicts with PX4 EKF2 odometry
      - hil              # Safety: HIL on real FCU is dangerous
      - actuator_control # Safety: direct PWM bypass skips all limits
      - 3dr_radio        # No radio telemetry hardware
      - ftp              # File transfer not needed
      - fake_gps         # Simulated GPS — dangerous on real hardware
      - landing_target   # Copter/VTOL only — not a rover concept
      - mocap_pose_estimate  # No motion capture system
      - vision_pose_estimate # No visual odometry pipeline
      - setpoint_accel   # Phase 2 uses setpoint_raw/local + setpoint_velocity
      - safety_area      # No visualiser consuming fence markers
      - guided_target    # Receive-only Nav2 goal plugin — we command, not receive goals
      - setpoint_position # Redundant with setpoint_raw/local (we use PositionTarget directly)
      - setpoint_attitude # Multirotor/VTOL attitude control — not applicable to rover
      - setpoint_trajectory # MAVLink trajectory following — not used
      - waypoint         # Mission waypoint management — we use OFFBOARD, not MAVLink missions
      - geofence         # Geofence upload — not needed for marking rover
      - rallypoint       # Rally points — multirotor concept
      - home_position    # Home position get/set — not critical for rover
      - altitude         # Altitude reporting — irrelevant for ground rover
      - vfr_hud          # Airspeed/altitude HUD — aircraft only
      - wind_estimation  # Wind estimation — aircraft only
      # gps_rtk is intentionally NOT denied — required for NTRIP RTK injection
